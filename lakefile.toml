name = "alt"
version = "1.1.0"
keywords = ["math", "learning-theory", "probability", "computability", "realizability"]
defaultTargets = ["ALT"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "Foundation"
git = "https://github.com/FormalizedFormalLogic/Foundation"
rev = "b47cf447255addf88a5d72781d0d29641948eb6e"

[[lean_lib]]
name = "ALT"
# doc-gen4's library facet documents the ROOT modules and their import closure,
# and Lake only counts a root that some glob matches (`isBuildableModule`), so
# the glob must be `ALT.*` (root AND submodules — `ALT.+` excludes the root
# itself, which is how v1.0's CI produced "0 root modules" and empty docs).
# The umbrella `ALT` is the sole root: ALT.lean imports every module, so its
# import closure is the whole development and the docs cover all of it.
roots = ["ALT"]
globs = ["ALT.*"]
