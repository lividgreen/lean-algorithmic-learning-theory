name: CI

# Snapshot-release repo: build + docs on pushes to main (rare, curated) and
# manual dispatch. Docs are built with the lake-native doc-gen4 facet
# (`ALT:docs` — doc-gen4 is an inherited, pinned dependency via Foundation)
# and deployed to Pages directly, the shape FormalizedFormalLogic/Foundation
# runs. docgen-action was dropped 2026-07-22 after its stack (extra scaffold
# plus .lake tarball caching) ran the runner out of disk. doc-gen4 has no
# link-against-hosted-Mathlib mode yet, so the docs still cover the dependency
# closure; the free-disk step keeps the margin.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read # read repository contents
  pages: write # deploy API docs to GitHub Pages
  id-token: write # OIDC token for the Pages deployment

# Never run two Pages deployments concurrently. Queue rather than cancel:
# with the docs resume-cache below, every run's progress is worth keeping.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The doc-gen4 output for the full Mathlib import closure plus the build
      # artifacts exceed the stock runner's free disk (the 2026-07-22 v1.1 run
      # died on ENOSPC in the docs step). Drop the preinstalled toolchains we
      # never use (~30 GB) before building.
      - name: Free runner disk for the docs build
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/.ghcup /usr/share/swift
          sudo docker image prune --all --force > /dev/null
          df -h /
      - uses: leanprover/lean-action@v1
        with:
          use-github-cache: false
      # Docs for the closure are heavy; a killed run must not start over.
      # Restore prior progress, cap the step below GitHub's 6 h job kill, and
      # save progress EVEN ON FAILURE — successive runs then converge instead
      # of restarting (the 2026-07-23 zombie-run lesson).
      - name: Restore docs progress
        id: docs-cache-restore
        uses: actions/cache/restore@v6
        with:
          path: .lake/build/doc
          key: docs-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            docs-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-
            docs-${{ hashFiles('lean-toolchain') }}-
      - name: Build API docs
        timeout-minutes: 300
        run: ~/.elan/bin/lake build ALT:docs
      - name: Save docs progress
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .lake/build/doc
          key: ${{ steps.docs-cache-restore.outputs.cache-primary-key }}
      - name: Assemble pages
        run: |
          mkdir -p pages
          cp -r .lake/build/doc pages/docs
          printf '<!doctype html><meta http-equiv="refresh" content="0; url=docs/">' > pages/index.html
          df -h /
      - uses: actions/upload-pages-artifact@v5
        with:
          path: pages

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
